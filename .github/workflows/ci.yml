name: Venice-H1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt --no-deps  # torch already installed above (CPU)
          pip install numpy matplotlib scikit-learn tqdm tensorboard pillow pyyaml timm opencv-python-headless huggingface-hub
          pip install pytest
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/test_pipeline.py -v --tb=short

      - name: Verify model parameter count
        run: |
          python -c "
          from venice_h1.model.reranker import VeniceH1Reranker
          model = VeniceH1Reranker(query_feat_dim=256, hidden_dim=512, n_layers=3, n_heads=8)
          n = model.num_parameters()
          print(f'Venice-H1 parameters: {n:,}')
          assert 10_000_000 < n < 13_000_000, f'Expected ~11.3M, got {n:,}'
          print('✓ Parameter count matches paper specification')
          "

      - name: Verify reproduce_results.py (architecture check)
        run: |
          python -c "
          from venice_h1.model.reranker import VeniceH1Reranker
          import torch
          model = VeniceH1Reranker(query_feat_dim=256, hidden_dim=512, n_layers=3, n_heads=8, tau=0.9)
          model.eval()
          features = torch.randn(4, 10, 936)
          det_scores = torch.rand(4, 10)
          mask_means = torch.rand(4, 10)
          with torch.no_grad():
              out = model(features, det_scores, mask_means)
              selected = model.rerank(features, det_scores, mask_means)
          assert out['p_fail'].shape == (4,)
          assert out['gain_logits'].shape == (4, 10)
          assert (selected >= 0).all() and (selected < 10).all()
          print('✓ reproduce_results pipeline verified')
          "
